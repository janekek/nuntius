services:
  backend:
    build: ./src/backend
    restart: always
    volumes:
      - ./src/backend/database:/app/database
    ports:
      - "5000:5000"

  frontend:
    build: ./src/frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
  homepage:
    image: php:8.2-apache
    container_name: homepage
    restart: always
    volumes:
      - ./src/homepage:/var/www/html
    ports:
      - "8080:80"
